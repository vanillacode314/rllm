name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build web project
        env:
          VITE_SYNC_SERVER_BASE_URL: https://app-production-cc27.up.railway.app
          VITE_MODE: android
        run: bun run build --filter rllm

      - name: Sync Capacitor
        run: |
          cd apps/web/rllm
          bunx cap sync android

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.keystore

      - name: Build release APK
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd apps/web/rllm/android
          echo "storePassword=$STORE_PASSWORD" >> local.properties
          echo "keyAlias=$KEY_ALIAS" >> local.properties
          echo "keyPassword=$KEY_PASSWORD" >> local.properties
          ./gradlew assembleRelease

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            apps/web/rllm/android/app/build/outputs/apk/release/app-release.apk
          name: "${{ github.ref_name }}"
          body: "Auto‑generated release for version ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
